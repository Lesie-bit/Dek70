<!DOCTYPE html>
<html lang="th">

<head>
        <script>
        const token = localStorage.getItem('token')
        if (!token) {
            window.location.href = '/login.html'
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPS Maintenance Request - โรงเรียนสรรพวิทยาคม</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f4f6f9;
        }

        /* Custom school color palette */
        .bg-school {
            background-color: #f1f8fc;
            /* Light school blue/grey */
        }

        .text-school-primary {
            color: #007bff;
            /* Primary school blue */
        }

        .card-header-custom {
            background-color: #d8ecf9;
            /* Card header color */
            border-bottom: 2px solid #e0e0e0;
        }

        .map-placeholder {
            height: 150px;
            background-color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            color: #6c757d;
            border: 2px dashed #adb5bd;
            cursor: pointer;
            position: relative;
        }

        .map-placeholder:hover {
            background-color: #d8ecf9;
            border-color: #007bff;
            color: #007bff;
        }

        .map-pin-icon {
            font-size: 2rem;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        form label {
            font-weight: 500;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-school shadow-sm">
        <div class="container">
            <a class="navbar-brand text-school-primary" href="#">
                <i class="fa-solid fa-school me-2"></i> ระบบแจ้งซ่อมบำรุงโรงเรียนสรรพวิทยาคม
            </a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="index.html">หน้าหลัก</a>
            </div>

        </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow">
                    <div class="card-header card-header-custom text-school-primary">
                        <h4 class="mb-0"><i class="fa-regular fa-paper-plane me-2"></i>ส่งคำร้องแจ้งซ่อมใหม่</h4>
                    </div>
                    <div class="card-body p-4">
                        <p class="text-muted mb-4">กรุณากรอกข้อมูลเพื่อแจ้งซ่อมบำรุง หากมีรูปภาพโปรดแนบมาด้วย</p>

                        <form id="repairRequestForm">

                            <div class="mb-3 row">
                                <label for="reportDate" class="col-sm-3 col-form-label">วันที่แจ้ง</label>
                                <div class="col-sm-9">
                                    <input type="text" class="form-control" id="reportDate" readonly>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="reporterName" class="form-label">ชื่อผู้แจ้ง</label>
                                    <input type="text" class="form-control" id="reporterName"
                                        placeholder="เช่น นายสมชาย สมบัติ">
                                </div>
                                <div class="col-md-6">
                                    <label for="contactNumber" class="form-label">เบอร์ติดต่อกลับ (กรณีเร่งด่วน)</label>
                                    <input type="tel" class="form-control" id="contactNumber"
                                        placeholder="เช่น 0xx-xxxxxxx">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="repairCategory" class="form-label">ประเภทงานซ่อม</label>
                                <select class="form-select" id="repairCategory">
                                    <option value="" disabled selected>-- เลือกประเภทงาน --</option>
                                    <option value="ไฟฟ้า">ไฟฟ้า</option>
                                    <option value="ประปา">ประปา</option>
                                    <option value="อาคาร">อาคาร</option>
                                    <option value="คอมพิวเตอร์">คอมพิวเตอร์/IT</option>
                                </select>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label for="locationBuilding" class="form-label">อาคาร/สถานที่หลัก</label>
                                    <select class="form-select" id="locationBuilding">
                                        <option value="" disabled selected>-- เลือกอาคาร --</option>
                                        <option value="อาคาร 1">อาคาร 1</option>
                                        <option value="อาคาร 2">อาคาร 2</option>
                                        <option value="อาคาร 3">อาคาร 3</option>
                                        <option value="ยิมเนเซียม">ยิมเนเซียม</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="locationDetail" class="form-label">ห้อง/ชั้น/จุดสังเกต</label>
                                    <input type="text" class="form-control" id="locationDetail"
                                        placeholder="เช่น ห้อง 311, ชั้น 2">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">📍 ปักหมุดบนแผนที่โรงเรียน (เพื่อความแม่นยำสูงสุด)</label>
                                <div class="map-placeholder" id="mapPlaceholder">
                                    <i class="fa-solid fa-location-dot map-pin-icon text-danger"></i>
                                    คลิกเพื่อปักหมุดจุดที่ชำรุด
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="repairDescription" class="form-label">รายละเอียดอาการเสีย</label>
                                <textarea class="form-control" id="repairDescription" rows="5"
                                    placeholder="กรุณาระบุรายละเอียด เช่น 'แอร์เปิดไม่ติด มีเสียงดัง'"></textarea>
                            </div>

                            <div class="mb-4">
                                <label for="repairPhoto" class="form-label">แนบรูปภาพ (ถ้ามี)</label>
                                <input class="form-control" type="file" id="repairPhoto">
                            </div>

                            <div class="d-flex justify-content-end gap-2">
                                <button type="button" class="btn btn-outline-secondary"
                                    onclick="resetForm()">ยกเลิก</button>
                                <button type="submit" class="btn btn-primary btn-lg px-5">ส่งคำร้อง</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-white border-top py-4 mt-5">
        <div class="container px-4">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3 text-secondary">
                <div>
                    <small>© 2026 ระบบแจ้งซ่อมบำรุงโรงเรียน. All rights reserved.</small>
                </div>
                <div>
                    <small>พัฒนาโดย <span class="fw-bold text-dark">นักเรียนชั้น ม.6</span> |
                        โปรเจ็กต์จบการศึกษา</small>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>

    <script>
        // 1. กทท. กำหนดวันที่แจ้งอัตโนมัติ
        document.addEventListener('DOMContentLoaded', function () {
            const dateInput = document.getElementById('reportDate');
            const now = new Date();
            const ThaiDateString = now.toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });
            dateInput.value = ThaiDateString;
        });

        // 2. ดักตอนกดปุ่ม "ส่งคำร้อง"
        const form = document.getElementById('repairRequestForm');
        form.addEventListener('submit', function (event) {
            event.preventDefault(); // ป้องกันการ reload หน้า

            // === ส่วนนี้คือตัวอย่าง Logic สำหรับ Prototype ยังไม่เชื่อมฐานข้อมูลจริง ===
            const reporter = document.getElementById('reporterName').value;
            const location = document.getElementById('locationBuilding').value + ' ' + document.getElementById('locationDetail').value;
            const description = document.getElementById('repairDescription').value;

            // เช็กข้อมูลขั้นต้น
            if (!reporter || !document.getElementById('locationBuilding').value || !description) {
                alert('❌ กรุณากรอกข้อมูลที่จำเป็นให้ครบถ้วน');
                return;
            }

            alert(`✅ ส่งคำร้องสำเร็จ (Prototype)! \nชื่อผู้แจ้ง: ${reporter}\nสถานที่: ${location}\nรายละเอียด: ${description}`);
            resetForm(); // ล้างฟอร์ม

            /* === แนวทางการเชื่อมต่อ Supabase ในอนาคต ===
               (น้องจะปรับแก้เพิ่มตรงนี้ทีหลัง)
            
               import { supabase } from './supabaseClient' // (ต้องสร้างไฟล์นี้ก่อน)
    
               const { data, error } = await supabase
                 .from('repairs')
                 .insert([{ 
                     reporter_name: reporter, 
                     location_building: document.getElementById('locationBuilding').value, 
                     location_detail: document.getElementById('locationDetail').value,
                     description: description,
                     contact_number: document.getElementById('contactNumber').value,
                     category: document.getElementById('repairCategory').value,
                     status: 'Wait for Review' // เซ็ตสถานะเริ่มต้น
                 }])
               
               if (error) { console.error('❌ Error saving to Supabase:', error); }
               else { console.log('✅ Supabase data saved!', data); }
            */
        });

        // ล้างฟอร์ม
        function resetForm() {
            form.reset();
            // รีเซ็ตวันที่แจ้งกลับไปที่เดิม
            const dateInput = document.getElementById('reportDate');
            const now = new Date();
            const ThaiDateString = now.toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });
            dateInput.value = ThaiDateString;
        }

        // ตัวอย่างเหตุการณ์ปักหมุดบนแผนที่
        const mapPlaceholder = document.getElementById('mapPlaceholder');
        mapPlaceholder.addEventListener('click', function () {
            alert('(Prototype) ฟังก์ชันปักหมุดบนแผนที่โรงเรียนจำลอง (กำลังพัฒนา)');
            // น้องจะใช้ JavaScript เพื่อดึงพิกัด (Lat/Long) และแสดงจุดปักหมุดที่ถูกต้องตรงนี้
        });
    </script>

</body>

</html>
