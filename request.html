<!DOCTYPE html>
<html lang="th">

<head>
    <script>
        const token = localStorage.getItem('token')
        if (!token) {
            window.location.href = '/login.html'
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPS Maintenance Request - โรงเรียนสรรพวิทยาคม</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f4f6f9;
        }

        .bg-school {
            background-color: #f1f8fc;
        }

        .text-school-primary {
            color: #007bff;
        }

        .card-header-custom {
            background-color: #d8ecf9;
            border-bottom: 2px solid #e0e0e0;
        }

        form label {
            font-weight: 500;
        }

        /* Map styles */
        .map-container {
            position: relative;
            width: 100%;
            cursor: crosshair;
            border-radius: 8px;
            overflow: hidden;
            border: 2px dashed #adb5bd;
        }

        .map-container:hover {
            border-color: #007bff;
        }

        .map-container img {
            width: 100%;
            display: block;
            user-select: none;
            pointer-events: none;
        }

        .map-pin {
            position: absolute;
            transform: translate(-50%, -100%);
            font-size: 2rem;
            pointer-events: none;
            filter: drop-shadow(2px 2px 2px rgba(0, 0, 0, 0.4));
            display: none;
        }

        .map-hint {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #6c757d;
            font-size: 0.95rem;
            text-align: center;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.7);
            padding: 8px 16px;
            border-radius: 8px;
        }

        /* Photo preview */
        #uploadPreview {
            max-width: 100%;
            max-height: 200px;
            border-radius: 8px;
            display: none;
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-school shadow-sm">
        <div class="container">
            <a class="navbar-brand text-school-primary" href="#">
                <i class="fa-solid fa-school me-2"></i> ระบบแจ้งซ่อมบำรุงโรงเรียนสรรพวิทยาคม
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">หน้าหลัก</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow">
                    <div class="card-header card-header-custom text-school-primary">
                        <h4 class="mb-0"><i class="fa-regular fa-paper-plane me-2"></i>ส่งคำร้องแจ้งซ่อมใหม่</h4>
                    </div>
                    <div class="card-body p-4">
                        <p class="text-muted mb-4">กรุณากรอกข้อมูลเพื่อแจ้งซ่อมบำรุง หากมีรูปภาพโปรดแนบมาด้วย</p>

                        <form id="repairRequestForm">
                            <div class="mb-3 row">
                                <label class="col-sm-3 col-form-label">วันที่แจ้ง</label>
                                <div class="col-sm-9">
                                    <input type="text" class="form-control" id="reportDate" readonly>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">ชื่อผู้แจ้ง</label>
                                    <input type="text" class="form-control" id="reporterName"
                                        placeholder="เช่น นายสมชาย สมบัติ">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">เบอร์ติดต่อกลับ</label>
                                    <input type="tel" class="form-control" id="contactNumber"
                                        placeholder="เช่น 0xx-xxxxxxx">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">ประเภทงานซ่อม</label>
                                <select class="form-select" id="repairCategory">
                                    <option value="" disabled selected>-- เลือกประเภทงาน --</option>
                                    <option value="ไฟฟ้า">ไฟฟ้า</option>
                                    <option value="ประปา">ประปา</option>
                                    <option value="อาคาร">อาคาร</option>
                                    <option value="คอมพิวเตอร์">คอมพิวเตอร์/IT</option>
                                </select>
                            </div>

                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">อาคาร/สถานที่หลัก</label>
                                    <select class="form-select" id="locationBuilding">
                                        <option value="" disabled selected>-- เลือกอาคาร --</option>
                                        <option value="อาคาร 1 ศรีเมืองฉอด">อาคาร 1 ศรีเมืองฉอด</option>
                                        <option value="อาคาร 2 ทิวสน">อาคาร 2 ทิวสน</option>
                                        <option value="อาคาร 3 เพชรประจิม">อาคาร 3 เพชรประจิม</option>
                                        <option value="อาคาร 4 ขุนสามชน">อาคาร 4 ขุนสามชน</option>
                                        <option value="อาคาร 5 อัญมณี">อาคาร 5 อัญมณี</option>
                                        <option value="อาคาร 6 พระวอมิ่งขวัญ">อาคาร 6 พระวอมิ่งขวัญ</option>
                                        <option value="อาคารอุตสาหกรรม">อาคารอุตสาหกรรม</option>
                                        <option value="อาคารอเนกประสงค์">อาคารอเนกประสงค์</option>
                                        <option value="อาคารพยาบาล">อาคารพยาบาล</option>
                                        <option value="อาคารสรรพการและโรงอาหาร">อาคารสรรพการและโรงอาหาร</option>
                                        <option value="อาคารโสตทัศนศึกษา">อาคารโสตทัศนศึกษา</option>
                                        <option value="อาคารเฉลิมพระเกียรติ100ปี">อาคารเฉลิมพระเกียรติ 100 ปี</option>
                                        <option value="โดมกิจกรรม">โดมกิจกรรม</option>
                                        <option value="อัฒจันทร์">อัฒจันทร์</option>
                                        <option value="สนามฟุตบอล">สนามฟุตบอล</option>
                                        <option value="สนามบาส">สนามบาส</option>
                                        <option value="ห้องสุขานักเรียน">ห้องสุขานักเรียน</option>
                                        <option value="ป้อมยาม">ป้อมยาม</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">ห้อง/ชั้น/จุดสังเกต</label>
                                    <input type="text" class="form-control" id="locationDetail"
                                        placeholder="เช่น ห้อง 311, ชั้น 2">
                                </div>
                            </div>

                            <!-- แผนที่ปักหมุด -->
                            <div class="mb-3">
                                <label class="form-label">📍 ปักหมุดบนแผนที่โรงเรียน</label>
                                <div class="map-container" id="mapContainer">
                                    <img src="https://res.cloudinary.com/daezwgbv/image/upload/v1783748805/sappha-re100_2569-2048x2048_1_wvsbte.jpg"
                                        alt="แผนผังโรงเรียนสรรพวิทยาคม" id="mapImage">
                                    <div class="map-hint" id="mapHint">
                                        🖱️ คลิกบนแผนที่เพื่อปักหมุดจุดที่ชำรุด
                                    </div>
                                    <div class="map-pin" id="mapPinIcon">📍</div>
                                </div>
                                <small class="mt-1 d-block" id="pinLocationText"></small>
                                <input type="hidden" id="pinX" value="">
                                <input type="hidden" id="pinY" value="">
                            </div>

                            <div class="mb-3">
                                <label class="form-label">รายละเอียดอาการเสีย</label>
                                <textarea class="form-control" id="repairDescription" rows="5"
                                    placeholder="กรุณาระบุรายละเอียด เช่น 'แอร์เปิดไม่ติด มีเสียงดัง'"></textarea>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">แนบรูปภาพ (ถ้ามี)</label>
                                <input class="form-control" type="file" id="repairPhoto" accept="image/*">
                                <img id="uploadPreview" src="" alt="preview">
                            </div>

                            <div class="d-flex justify-content-end gap-2">
                                <button type="button" class="btn btn-outline-secondary"
                                    onclick="resetForm()">ยกเลิก</button>
                                <button type="submit" class="btn btn-primary btn-lg px-5"
                                    id="submitBtn">ส่งคำร้อง</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-white border-top py-4 mt-5">
        <div class="container px-4">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3 text-secondary">
                <div><small>© 2026 ระบบแจ้งซ่อมบำรุงโรงเรียน. All rights reserved.</small></div>
                <div><small>พัฒนาโดย <span class="fw-bold text-dark">นักเรียนชั้น ม.6</span> |
                        โปรเจ็กต์จบการศึกษา</small></div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // กำหนดวันที่อัตโนมัติ
        document.addEventListener('DOMContentLoaded', function () {
            const now = new Date()
            document.getElementById('reportDate').value = now.toLocaleDateString('th-TH', {
                year: 'numeric', month: 'long', day: 'numeric'
            })
            const user = JSON.parse(localStorage.getItem('user'))
            if (user) document.getElementById('reporterName').value = user.name
        })

        // ระบบปักหมุดแผนที่
        const mapContainer = document.getElementById('mapContainer')
        const mapPinIcon = document.getElementById('mapPinIcon')
        const mapHint = document.getElementById('mapHint')
        const pinLocationText = document.getElementById('pinLocationText')

        mapContainer.addEventListener('click', function (e) {
            const rect = mapContainer.getBoundingClientRect()
            const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(2)
            const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(2)

            mapPinIcon.style.left = x + '%'
            mapPinIcon.style.top = y + '%'
            mapPinIcon.style.display = 'block'
            mapHint.style.display = 'none'

            document.getElementById('pinX').value = x
            document.getElementById('pinY').value = y

            pinLocationText.textContent = '📍 ปักหมุดแล้ว — คลิกใหม่เพื่อเปลี่ยนจุด'
            pinLocationText.className = 'text-success mt-1 d-block'
        })

        // Preview รูปภาพ
        document.getElementById('repairPhoto').addEventListener('change', function () {
            const file = this.files[0]
            if (file) {
                const reader = new FileReader()
                reader.onload = (e) => {
                    const preview = document.getElementById('uploadPreview')
                    preview.src = e.target.result
                    preview.style.display = 'block'
                }
                reader.readAsDataURL(file)
            }
        })

        // ส่งฟอร์ม
        document.getElementById('repairRequestForm').addEventListener('submit', async function (e) {
            e.preventDefault()

            const location_building = document.getElementById('locationBuilding').value
            const description = document.getElementById('repairDescription').value

            if (!location_building || !description) {
                alert('❌ กรุณากรอกข้อมูลที่จำเป็นให้ครบถ้วน')
                return
            }

            const btn = document.getElementById('submitBtn')
            btn.disabled = true
            btn.textContent = 'กำลังส่ง...'

            try {
                let image_url = null
                const photoFile = document.getElementById('repairPhoto').files[0]

                if (photoFile) {
                    btn.textContent = 'กำลังอัปโหลดรูป...'
                    const base64 = await new Promise((resolve) => {
                        const reader = new FileReader()
                        reader.onload = (e) => resolve(e.target.result)
                        reader.readAsDataURL(photoFile)
                    })
                    const uploadRes = await fetch('/api/upload', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ image: base64 })
                    })
                    const uploadData = await uploadRes.json()
                    if (uploadData.success) image_url = uploadData.url
                }

                btn.textContent = 'กำลังบันทึก...'
                const token = localStorage.getItem('token')

                const res = await fetch('/api/repairs', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        title: document.getElementById('repairCategory').value + ' - ' + location_building,
                        category: document.getElementById('repairCategory').value,
                        location_building,
                        location_detail: document.getElementById('locationDetail').value,
                        description,
                        contact_number: document.getElementById('contactNumber').value,
                        image_url,
                        pin_x: document.getElementById('pinX').value,
                        pin_y: document.getElementById('pinY').value
                    })
                })

                const data = await res.json()
                if (data.success) {
                    alert('✅ ส่งคำร้องสำเร็จ!')
                    window.location.href = '/index.html'
                } else {
                    alert('❌ ' + data.error)
                    btn.disabled = false
                    btn.textContent = 'ส่งคำร้อง'
                }
            } catch (err) {
                alert('❌ เกิดข้อผิดพลาด กรุณาลองใหม่')
                btn.disabled = false
                btn.textContent = 'ส่งคำร้อง'
            }
        })

        function resetForm() {
            document.getElementById('repairRequestForm').reset()
            document.getElementById('uploadPreview').style.display = 'none'
            document.getElementById('mapPinIcon').style.display = 'none'
            document.getElementById('mapHint').style.display = 'block'
            document.getElementById('pinLocationText').textContent = ''
            document.getElementById('pinX').value = ''
            document.getElementById('pinY').value = ''
            const now = new Date()
            document.getElementById('reportDate').value = now.toLocaleDateString('th-TH', {
                year: 'numeric', month: 'long', day: 'numeric'
            })
            const user = JSON.parse(localStorage.getItem('user'))
            if (user) document.getElementById('reporterName').value = user.name
        }
    </script>
</body>

</html>
