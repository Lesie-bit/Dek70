<!DOCTYPE html>
<html lang="th">
<head>
    <script>
        const _user = JSON.parse(localStorage.getItem('user'))
        if (!_user || _user.role !== 'admin') { window.location.href = '/login.html' }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - ระบบแจ้งซ่อมบำรุงโรงเรียนสรรพวิทยาคม</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --navy: #1B3A6B; --navy-mid: #2D5F8A; --navy-light: #4A90C4; --navy-pale: #E8F0F8; --gold: #C9922A; }
        body { background-color: #F0F4F8; font-family: 'Segoe UI', 'Sarabun', sans-serif; }
        .navbar-main { background: var(--navy); border-bottom: 3px solid var(--gold); }
        .stat-card { border: none; border-radius: 12px; box-shadow: 0 4px 16px rgba(27,58,107,0.1); overflow: hidden; }
        .stat-card .card-body { padding: 1.5rem; }
        .nav-tabs .nav-link { color: #6B7A99; font-weight: 500; }
        .nav-tabs .nav-link.active { color: var(--navy); font-weight: 700; border-bottom: 3px solid var(--gold); background: none; }
        .table thead th { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.5px; color: #6B7A99; font-weight: 600; }
        .status-pill { font-size: 0.78rem; font-weight: 600; padding: 4px 12px; border-radius: 20px; }
        .status-pending { background: #E8F0F8; color: #1B3A6B; }
        .status-in_progress { background: #FEF3E2; color: #C9922A; }
        .status-done { background: #E6F4EC; color: #2E7D52; }
        .cat-badge { font-size: 0.75rem; background: var(--navy-pale); color: var(--navy); padding: 2px 8px; border-radius: 10px; }
        footer { background: var(--navy); color: rgba(255,255,255,0.6); }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-main py-3">
        <div class="container px-4 d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-3">
                <div class="rounded-circle d-flex align-items-center justify-content-center" style="width:40px;height:40px;background:rgba(201,146,42,0.25)">
                    <i class="bi bi-shield-fill text-warning fs-5"></i>
                </div>
                <div>
                    <span class="fw-bold text-white d-block">Admin Dashboard</span>
                    <small class="text-white-50">โรงเรียนสรรพวิทยาคม</small>
                </div>
            </div>
            <div class="d-flex align-items-center gap-3">
                <span class="text-white small"><i class="bi bi-person-circle me-1"></i><span id="adminName"></span></span>
                <button onclick="logout()" class="btn btn-outline-light btn-sm">ออกจากระบบ</button>
            </div>
        </div>
    </nav>

    <div class="container px-4 mt-4 flex-grow-1">
        <!-- Stats -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-3">
                <div class="card stat-card" style="border-top: 4px solid #1B3A6B">
                    <div class="card-body">
                        <p class="text-muted small mb-1">คำขอทั้งหมด</p>
                        <h2 class="fw-bold mb-0" id="statTotal" style="color:#1B3A6B">-</h2>
                        <small class="text-muted"><i class="bi bi-file-earmark-text me-1"></i>รายการ</small>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card" style="border-top: 4px solid #6B7A99">
                    <div class="card-body">
                        <p class="text-muted small mb-1">รอรับเรื่อง</p>
                        <h2 class="fw-bold mb-0" id="statPending" style="color:#6B7A99">-</h2>
                        <small class="text-muted"><i class="bi bi-hourglass-split me-1"></i>รายการ</small>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card" style="border-top: 4px solid #C9922A">
                    <div class="card-body">
                        <p class="text-muted small mb-1">กำลังดำเนินการ</p>
                        <h2 class="fw-bold mb-0" id="statInProgress" style="color:#C9922A">-</h2>
                        <small class="text-muted"><i class="bi bi-wrench me-1"></i>รายการ</small>
                    </div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="card stat-card" style="border-top: 4px solid #2E7D52">
                    <div class="card-body">
                        <p class="text-muted small mb-1">เสร็จแล้ว</p>
                        <h2 class="fw-bold mb-0" id="statDone" style="color:#2E7D52">-</h2>
                        <small class="text-muted"><i class="bi bi-check-circle me-1"></i>รายการ</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabs -->
        <ul class="nav nav-tabs mb-3">
            <li class="nav-item">
                <button class="nav-link active" onclick="showTab('repairs', this)">
                    <i class="bi bi-list-ul me-1"></i>คำขอทั้งหมด
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" onclick="showTab('users', this)">
                    <i class="bi bi-people me-1"></i>จัดการ User
                </button>
            </li>
        </ul>

        <!-- Tab Repairs -->
        <div id="tab-repairs">
            <div class="card border-0 shadow-sm rounded-3">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4">วันที่</th>
                                    <th>ผู้แจ้ง</th>
                                    <th>ประเภท</th>
                                    <th>สถานที่</th>
                                    <th>รายละเอียด</th>
                                    <th>ช่างผู้รับ</th>
                                    <th>สถานะ</th>
                                </tr>
                            </thead>
                            <tbody id="repairsBody">
                                <tr><td colspan="7" class="text-center py-4"><div class="spinner-border" style="color:#1B3A6B"></div></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab Users -->
        <div id="tab-users" style="display:none">
            <div class="card border-0 shadow-sm rounded-3">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4">ชื่อ</th>
                                    <th>อีเมล</th>
                                    <th>Role</th>
                                    <th>วันที่สมัคร</th>
                                    <th class="text-center">จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="usersBody">
                                <tr><td colspan="5" class="text-center py-4"><div class="spinner-border" style="color:#1B3A6B"></div></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-4 mt-5">
        <div class="container px-4 text-center">
            <small>© 2026 ระบบแจ้งซ่อมบำรุง โรงเรียนสรรพวิทยาคม | พัฒนาโดยนักเรียน ม.6</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('token')
        const currentUser = JSON.parse(localStorage.getItem('user'))
        document.getElementById('adminName').textContent = currentUser?.name || ''

        const statusLabel = { pending: 'รอรับเรื่อง', in_progress: 'กำลังดำเนินการ', done: 'เสร็จแล้ว' }
        const statusCls = { pending: 'status-pending', in_progress: 'status-in_progress', done: 'status-done' }
        const roleLabel = { student: 'นักเรียน/ครู', technician: 'ช่าง', admin: 'Admin' }
        const roleBadge = { student: 'secondary', technician: 'primary', admin: 'warning' }

        async function loadStats() {
            const res = await fetch('/api/admin/stats', { headers: { 'Authorization': `Bearer ${token}` } })
            const data = await res.json()
            document.getElementById('statTotal').textContent = data.total
            document.getElementById('statPending').textContent = data.pending
            document.getElementById('statInProgress').textContent = data.in_progress
            document.getElementById('statDone').textContent = data.done
            loadRepairs()
        }

        async function loadRepairs() {
            const res = await fetch('/api/repairs?all=true', { headers: { 'Authorization': `Bearer ${token}` } })
            const data = await res.json()
            const tbody = document.getElementById('repairsBody')
            if (!data.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">ยังไม่มีคำขอ</td></tr>'
                return
            }
            tbody.innerHTML = data.map(r => {
                const date = new Date(r.created_at).toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' })
                const catHtml = r.sub_category
                    ? `<span class="cat-badge">${r.category}</span><br><small class="text-muted">${r.sub_category}</small>`
                    : `<span class="cat-badge">${r.category || '-'}</span>`
                return `<tr>
                    <td class="ps-4"><small>${date}</small></td>
                    <td><small>${r.reporter_name}</small></td>
                    <td>${catHtml}</td>
                    <td><small>${r.location_building}<br><span class="text-muted">${r.location_detail || ''}</span></small></td>
                    <td><small>${r.description?.substring(0, 45)}${r.description?.length > 45 ? '...' : ''}</small></td>
                    <td><small>${r.assigned_to || '<span class="text-muted">-</span>'}</small></td>
                    <td><span class="status-pill ${statusCls[r.status]}">${statusLabel[r.status]}</span></td>
                </tr>`
            }).join('')
        }

        async function loadUsers() {
            const res = await fetch('/api/admin/users', { headers: { 'Authorization': `Bearer ${token}` } })
            const data = await res.json()
            const tbody = document.getElementById('usersBody')
            tbody.innerHTML = data.map(u => `
            <tr>
                <td class="ps-4 fw-semibold">${u.name}</td>
                <td><small class="text-muted">${u.email}</small></td>
                <td><span class="badge bg-${roleBadge[u.role]} text-${u.role === 'admin' ? 'dark' : 'white'} rounded-pill px-3">${roleLabel[u.role]}</span></td>
                <td><small>${new Date(u.created_at).toLocaleDateString('th-TH')}</small></td>
                <td class="text-center pe-4">
                    <select class="form-select form-select-sm d-inline-block w-auto me-1" onchange="changeRole('${u._id}', this.value)">
                        <option value="student" ${u.role === 'student' ? 'selected' : ''}>นักเรียน/ครู</option>
                        <option value="technician" ${u.role === 'technician' ? 'selected' : ''}>ช่าง</option>
                        <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option>
                    </select>
                    <button class="btn btn-outline-danger btn-sm" onclick="deleteUser('${u._id}', '${u.name}')">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            </tr>`).join('')
        }

        async function changeRole(userId, role) {
            const res = await fetch('/api/admin/users', {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ userId, role })
            })
            const data = await res.json()
            if (data.success) alert('✅ เปลี่ยน role สำเร็จ')
            else alert('❌ ' + data.error)
        }

        async function deleteUser(userId, name) {
            if (!confirm(`ลบ "${name}" ออกจากระบบ?`)) return
            const res = await fetch('/api/admin/users', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ userId })
            })
            const data = await res.json()
            if (data.success) loadUsers()
        }

        function showTab(tab, btn) {
            document.getElementById('tab-repairs').style.display = 'none'
            document.getElementById('tab-users').style.display = 'none'
            document.getElementById('tab-' + tab).style.display = 'block'
            document.querySelectorAll('.nav-tabs .nav-link').forEach(b => b.classList.remove('active'))
            btn.classList.add('active')
            if (tab === 'users') loadUsers()
        }

        function logout() {
            localStorage.removeItem('token')
            localStorage.removeItem('user')
            window.location.href = '/login.html'
        }

        loadStats()
    </script>
</body>
</html>
