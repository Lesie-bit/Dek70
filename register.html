<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - ระบบแจ้งซ่อมบำรุงโรงเรียน</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        body {
            background-color: #f4f6f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        }

        .login-header {
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            color: white;
            text-align: center;
            padding: 2rem 1rem;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }

        .login-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
    </style>
</head>

<body>

    <main class="login-wrapper">
        <div class="card login-card">
            <div class="login-header">
                <i class="bi bi-person-plus login-icon"></i>
                <h4 class="mb-0 fw-bold">สมัครสมาชิก</h4>
                <p class="mb-0 text-white-50 mt-1">ระบบแจ้งซ่อมบำรุงโรงเรียน</p>
            </div>

            <div class="card-body p-4">
                <form>
                    <div class="mb-3">
                        <label class="form-label text-secondary fw-semibold">ชื่อ-นามสกุล</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white text-secondary"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="name" placeholder="กรอกชื่อ-นามสกุล" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-secondary fw-semibold">อีเมล</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white text-secondary"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="email" placeholder="กรอกอีเมล @sappha.ac.th"
                                required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-secondary fw-semibold">รหัสผ่าน</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white text-secondary"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password"
                                placeholder="กรอกรหัสผ่าน (อย่างน้อย 6 ตัว)" required>
                        </div>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm">สมัครสมาชิก</button>
                    </div>

                    <div class="text-center">
                        <small class="text-secondary">มีบัญชีแล้ว? <a href="login.html">เข้าสู่ระบบ</a></small>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-white border-top py-4 mt-5">
        <div class="container px-4">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3 text-secondary">
                <div>
                    <small>© 2026 ระบบแจ้งซ่อมบำรุงโรงเรียน. All rights reserved.</small>
                </div>
                <div>
                    <small>พัฒนาโดย <span class="fw-bold text-dark">นักเรียนชั้น ม.6</span> |
                        โปรเจ็กต์จบการศึกษา</small>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelector('form').addEventListener('submit', async function (e) {
            e.preventDefault()

            const name = document.getElementById('name').value
            const email = document.getElementById('email').value
            const password = document.getElementById('password').value
            const btn = document.querySelector('button[type="submit"]')

            btn.disabled = true
            btn.textContent = 'กำลังสมัคร...'

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                })
                const data = await res.json()

                if (data.success) {
                    alert('สมัครสมาชิกสำเร็จ กรุณาเข้าสู่ระบบ')
                    window.location.href = '/login.html'
                } else {
                    alert(data.error)
                    btn.disabled = false
                    btn.textContent = 'สมัครสมาชิก'
                }
            } catch (err) {
                alert('เกิดข้อผิดพลาด กรุณาลองใหม่')
                btn.disabled = false
                btn.textContent = 'สมัครสมาชิก'
            }
        })
    </script>
</body>

</html>
