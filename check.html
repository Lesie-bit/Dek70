<!DOCTYPE html>
<html lang="th">
<head>
    <script>
        if (!localStorage.getItem('token')) { window.location.href = 'login.html' }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ติดตามสถานะ - โรงเรียนสรรพวิทยาคม</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --navy: #1B3A6B; --navy-mid: #2D5F8A; --navy-light: #4A90C4; --navy-pale: #E8F0F8; --gold: #C9922A; }
        body { background-color: #F0F4F8; font-family: 'Segoe UI', 'Sarabun', sans-serif; }
        .navbar-main { background: var(--navy); }
        .navbar-main .navbar-brand { color: white !important; }
        .page-header { background: linear-gradient(90deg, var(--navy) 0%, var(--navy-mid) 100%); color: white; padding: 1.5rem 0; border-bottom: 4px solid var(--gold); }
        .form-control:focus { border-color: var(--navy-light); box-shadow: 0 0 0 3px rgba(74,144,196,0.15); }
        .repair-img { width: 56px; height: 56px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 2px solid #D1DCE8; }
        .status-pill { font-size: 0.78rem; font-weight: 600; padding: 5px 14px; border-radius: 20px; }
        .status-pending { background: #E8F0F8; color: #1B3A6B; }
        .status-in_progress { background: #FEF3E2; color: #C9922A; }
        .status-done { background: #E6F4EC; color: #2E7D52; }
        .table thead th { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; color: #6B7A99; font-weight: 600; border-bottom: 2px solid #D1DCE8; }
        footer { background: var(--navy); color: rgba(255,255,255,0.6); }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-main py-3">
        <div class="container px-4 d-flex justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center gap-2 text-decoration-none" href="#">
                <i class="bi bi-tools"></i> ระบบแจ้งซ่อมบำรุง
            </a>
            <a href="index.html" class="btn btn-outline-light btn-sm">
                <i class="bi bi-house me-1"></i>หน้าหลัก
            </a>
        </div>
    </nav>

    <div class="page-header">
        <div class="container px-4">
            <h5 class="fw-bold mb-0"><i class="bi bi-list-check me-2"></i>ติดตามสถานะการแจ้งซ่อมของฉัน</h5>
        </div>
    </div>

    <div class="container px-4 my-4 flex-grow-1">
        <div class="card border-0 shadow-sm rounded-3">
            <div class="card-body p-4">
                <div class="row mb-4 align-items-center">
                    <div class="col-md-5">
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i class="bi bi-search text-muted"></i></span>
                            <input type="text" class="form-control border-start-0" id="searchInput"
                                placeholder="ค้นหาอาคาร, ประเภท, รายละเอียด..."
                                oninput="filterData(this.value)">
                        </div>
                    </div>
                    <div class="col-md-7 mt-2 mt-md-0 d-flex gap-2 flex-wrap">
                        <button class="btn btn-sm btn-navy active-filter" onclick="filterStatus('all', this)" style="background:#1B3A6B;color:white">ทั้งหมด</button>
                        <button class="btn btn-sm btn-outline-secondary" onclick="filterStatus('pending', this)">รอรับเรื่อง</button>
                        <button class="btn btn-sm btn-outline-secondary" onclick="filterStatus('in_progress', this)">กำลังดำเนินการ</button>
                        <button class="btn btn-sm btn-outline-secondary" onclick="filterStatus('done', this)">เสร็จแล้ว</button>
                    </div>
                </div>

                <div id="loadingMsg" class="text-center py-5 text-muted">
                    <div class="spinner-border mb-2" style="color:#1B3A6B"></div>
                    <p class="mb-0">กำลังโหลดข้อมูล...</p>
                </div>

                <div class="table-responsive" id="tableWrapper" style="display:none">
                    <table class="table align-middle mb-0">
                        <thead>
                            <tr>
                                <th>วันที่แจ้ง</th>
                                <th>ประเภท</th>
                                <th>สถานที่</th>
                                <th>รายละเอียด</th>
                                <th>รูป</th>
                                <th>ช่างผู้รับ</th>
                                <th>สถานะ</th>
                            </tr>
                        </thead>
                        <tbody id="repairTableBody"></tbody>
                    </table>
                </div>

                <div id="emptyMsg" class="text-center py-5" style="display:none">
                    <i class="bi bi-inbox fs-1 text-muted d-block mb-2"></i>
                    <p class="text-muted mb-3">ยังไม่มีคำขอแจ้งซ่อม</p>
                    <a href="request.html" class="btn btn-sm" style="background:#1B3A6B;color:white">
                        <i class="bi bi-plus-circle me-1"></i>แจ้งซ่อมตอนนี้
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal รูปใหญ่ -->
    <div class="modal fade" id="imgModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0">
                <div class="modal-body p-0 text-center bg-dark">
                    <img id="imgModalSrc" src="" class="img-fluid" style="max-height:80vh;">
                </div>
            </div>
        </div>
    </div>

    <footer class="py-4 mt-5">
        <div class="container px-4 text-center">
            <small>© 2026 ระบบแจ้งซ่อมบำรุง โรงเรียนสรรพวิทยาคม | พัฒนาโดยนักเรียน ม.6</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('token')
        let allData = []
        let currentStatus = 'all'

        const statusLabel = { pending: 'รอรับเรื่อง', in_progress: 'กำลังดำเนินการ', done: 'เสร็จแล้ว' }
        const statusClass = { pending: 'status-pending', in_progress: 'status-in_progress', done: 'status-done' }

        async function fetchRepairs() {
            try {
                const res = await fetch('/api/repairs', { headers: { 'Authorization': `Bearer ${token}` } })
                allData = await res.json()
                document.getElementById('loadingMsg').style.display = 'none'
                if (allData.length === 0) {
                    document.getElementById('emptyMsg').style.display = 'block'
                } else {
                    document.getElementById('tableWrapper').style.display = 'block'
                    renderTable(allData)
                }
            } catch {
                document.getElementById('loadingMsg').innerHTML = '<p class="text-danger">โหลดข้อมูลไม่สำเร็จ</p>'
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('repairTableBody')
            if (!data.length) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">ไม่พบข้อมูล</td></tr>'
                return
            }
            tbody.innerHTML = data.map(r => {
                const date = new Date(r.created_at).toLocaleDateString('th-TH', { year: 'numeric', month: 'short', day: 'numeric' })
                const imgHtml = r.image_url
                    ? `<img src="${r.image_url}" class="repair-img" onclick="showImg('${r.image_url}')" title="คลิกดูรูปใหญ่">`
                    : '<span class="text-muted small">-</span>'
                const catHtml = r.sub_category
                    ? `<span class="fw-semibold">${r.category}</span><br><small class="text-muted">${r.sub_category}</small>`
                    : `<span class="fw-semibold">${r.category || '-'}</span>`

                return `<tr>
                    <td><small>${date}</small></td>
                    <td>${catHtml}</td>
                    <td><span class="fw-semibold small">${r.location_building}</span><br><small class="text-muted">${r.location_detail || ''}</small></td>
                    <td><small>${r.description?.substring(0, 60)}${r.description?.length > 60 ? '...' : ''}</small></td>
                    <td>${imgHtml}</td>
                    <td><small>${r.assigned_to || '<span class="text-muted">รอมอบหมาย</span>'}</small>${r.note ? `<br><small class="text-muted">${r.note}</small>` : ''}</td>
                    <td><span class="status-pill ${statusClass[r.status] || ''}">${statusLabel[r.status] || r.status}</span></td>
                </tr>`
            }).join('')
        }

        function filterData(keyword) {
            const kw = keyword.toLowerCase()
            const base = currentStatus === 'all' ? allData : allData.filter(r => r.status === currentStatus)
            renderTable(base.filter(r =>
                r.location_building?.toLowerCase().includes(kw) ||
                r.description?.toLowerCase().includes(kw) ||
                r.category?.toLowerCase().includes(kw) ||
                r.sub_category?.toLowerCase().includes(kw)
            ))
        }

        function filterStatus(status, btn) {
            currentStatus = status
            document.querySelectorAll('.col-md-7 .btn').forEach(b => {
                b.style.background = ''
                b.style.color = ''
                b.className = 'btn btn-sm btn-outline-secondary'
            })
            btn.style.background = '#1B3A6B'
            btn.style.color = 'white'
            btn.className = 'btn btn-sm'
            const filtered = status === 'all' ? allData : allData.filter(r => r.status === status)
            renderTable(filtered)
        }

        function showImg(url) {
            document.getElementById('imgModalSrc').src = url
            new bootstrap.Modal(document.getElementById('imgModal')).show()
        }

        fetchRepairs()
    </script>
</body>
</html>
