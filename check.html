<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ติดตามผลการแจ้งซ่อม - โรงเรียนสรรพวิทยาคม</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Sarabun', sans-serif;
        }

        .bg-school {
            background-color: #f1f8fc;
        }

        .text-school-primary {
            color: #007bff;
        }

        .card-header-custom {
            background-color: #d8ecf9;
            border-bottom: 2px solid #e0e0e0;
        }
    </style>
    <script>
        if (!localStorage.getItem('token')) {
            window.location.href = 'login.html'
        }
    </script>
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-light bg-school shadow-sm">
        <div class="container">
            <a class="navbar-brand text-school-primary" href="#">
                <i class="fa-solid fa-school me-2"></i>ระบบแจ้งซ่อมบำรุงโรงเรียนสรรพวิทยาคม
            </a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">หน้าหลัก</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container my-5 flex-grow-1">
        <div class="card shadow">
            <div class="card-header card-header-custom text-school-primary p-3">
                <h4 class="mb-0"><i class="fa-solid fa-list-check me-2"></i>ติดตามสถานะการแจ้งซ่อม (Result Tracking)
                </h4>
            </div>
            <div class="card-body p-4">

                <div class="row mb-4">
                    <div class="col-md-6 col-lg-4">
                        <div class="input-group">
                            <span class="input-group-text bg-white"><i
                                    class="fa-solid fa-magnifying-glass text-muted"></i></span>
                            <input type="text" id="searchInput" class="form-control"
                                placeholder="ค้นหาเลขเคส, อาคาร หรือผู้แจ้ง...">
                        </div>
                    </div>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover align-middle border">
                        <thead class="table-light">
                            <tr>
                                <th style="width: 10%">เคส ID</th>
                                <th style="width: 15%">วันที่แจ้ง</th>
                                <th style="width: 20%">อาคาร/ห้อง</th>
                                <th style="width: 25%">ปัญหาที่แจ้ง</th>
                                <th style="width: 15%">ผู้แจ้ง</th>
                                <th style="width: 15%">สถานะ</th>
                            </tr>
                        </thead>
                        <tbody id="repairTableBody">
                            <tr>
                                <td colspan="6" class="text-center text-danger py-4">
                                    <i class="fa-solid fa-circle-exclamation me-2"></i> โหลดข้อมูลล้มเหลว
                                    กรุณาตรวจสอบการเชื่อมต่อ API
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <footer class="bg-white border-top py-4 mt-5">
        <div class="container px-4">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3 text-secondary">
                <div>
                    <small>© 2026 ระบบแจ้งซ่อมบำรุงโรงเรียน. All rights reserved.</small>
                </div>
                <div>
                    <small>พัฒนาโดย <span class="fw-bold text-dark">นักเรียนชั้น ม.6</span> |
                        โปรเจ็กต์จบการศึกษา</small>
                </div>
            </div>
        </div>
    </footer>

    <script>
        // ส่วน script ทำงานเหมือนเดิมทุกประการ...
        const GOOGLE_SHEET_API_URL = 'ใส่_URL_เว็บแอปของ_Google_Apps_Script_ตรงนี้';
        let allRepairsData = [];

        async function fetchRepairs() {
            try {
                if (GOOGLE_SHEET_API_URL.includes('ใส่_URL')) return;
                const response = await fetch(GOOGLE_SHEET_API_URL);
                allRepairsData = await response.json();
                renderTable(allRepairsData);
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('repairTableBody');
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-muted">ไม่พบข้อมูลการแจ้งซ่อม</td></tr>`;
                return;
            }
            let htmlRows = '';
            data.forEach(item => {
                htmlRows += `
                <tr>
                    <td class="fw-bold">#${item.id}</td>
                    <td>${item.date}</td>
                    <td><span class="badge bg-light text-dark border">${item.building}</span> ${item.room}</td>
                    <td>${item.description}</td>
                    <td>${item.reporter}</td>
                    <td><span class="badge bg-primary px-3 py-2">${item.status}</span></td>
                </tr>
            `;
            });
            tbody.innerHTML = htmlRows;
        }

        window.onload = fetchRepairs;
    </script>
</body>

</html>
