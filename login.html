<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - ระบบแจ้งซ่อมบำรุงโรงเรียนสรรพวิทยาคม</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --navy: #1B3A6B;
            --navy-mid: #2D5F8A;
            --navy-light: #4A90C4;
            --navy-pale: #E8F0F8;
            --bg: #F0F4F8;
            --text: #1A2744;
        }
        body {
            background: linear-gradient(135deg, #1B3A6B 0%, #2D5F8A 50%, #4A90C4 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', 'Sarabun', sans-serif;
        }
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
            overflow: hidden;
        }
        .login-header {
            background: var(--navy);
            color: white;
            text-align: center;
            padding: 2.5rem 1rem 2rem;
            border-bottom: 3px solid #C9922A;
        }
        .school-emblem {
            width: 72px;
            height: 72px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            border: 2px solid rgba(201,146,42,0.6);
        }
        .login-body { padding: 2rem; background: white; }
        .form-control:focus, .form-select:focus {
            border-color: var(--navy-light);
            box-shadow: 0 0 0 3px rgba(74,144,196,0.15);
        }
        .input-group-text { background: var(--navy-pale); border-color: #D1DCE8; color: var(--navy); }
        .btn-navy {
            background: var(--navy);
            color: white;
            border: none;
            padding: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .btn-navy:hover { background: var(--navy-mid); color: white; transform: translateY(-1px); }
        .btn-navy:disabled { background: #8899BB; color: white; transform: none; }
        footer { background: rgba(0,0,0,0.2); color: rgba(255,255,255,0.6); }
        a { color: var(--navy-light); }
    </style>
</head>
<body>
    <main class="login-wrapper">
        <div class="card login-card">
            <div class="login-header">
                <div class="school-emblem">
                    <i class="bi bi-tools fs-2 text-white"></i>
                </div>
                <h4 class="mb-1 fw-bold">เข้าสู่ระบบ</h4>
                <p class="mb-0 text-white-50 small">ระบบแจ้งซ่อมบำรุง โรงเรียนสรรพวิทยาคม</p>
            </div>
            <div class="login-body">
                <form>
                    <div class="mb-3">
                        <label class="form-label fw-semibold text-secondary small">อีเมลโรงเรียน</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
                            <input type="email" class="form-control" id="email" placeholder="ชื่อ@sappha.ac.th" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold text-secondary small">รหัสผ่าน</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" class="form-control" id="password" placeholder="••••••••" required>
                        </div>
                    </div>
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-navy btn-lg" id="submitBtn">
                            <i class="bi bi-box-arrow-in-right me-2"></i>เข้าสู่ระบบ
                        </button>
                    </div>
                    <div class="text-center">
                        <small class="text-muted">ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a></small>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <footer class="py-3 text-center">
        <small>© 2026 ระบบแจ้งซ่อมบำรุง โรงเรียนสรรพวิทยาคม | พัฒนาโดยนักเรียน ม.6</small>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelector('form').addEventListener('submit', async function(e) {
            e.preventDefault()
            const email = document.getElementById('email').value
            const password = document.getElementById('password').value
            const btn = document.getElementById('submitBtn')
            btn.disabled = true
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>กำลังเข้าสู่ระบบ...'
            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                })
                const data = await response.json()
                if (response.ok && data.token) {
                    localStorage.setItem('token', data.token)
                    localStorage.setItem('user', JSON.stringify(data.user))
                    const role = data.user.role
                    if (role === 'admin') window.location.href = '/admin.html'
                    else if (role === 'technician') window.location.href = '/technician.html'
                    else window.location.href = '/index.html'
                } else {
                    alert(data.error)
                    btn.disabled = false
                    btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>เข้าสู่ระบบ'
                }
            } catch {
                alert('เกิดข้อผิดพลาด กรุณาลองใหม่')
                btn.disabled = false
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right me-2"></i>เข้าสู่ระบบ'
            }
        })
    </script>
</body>
</html>
