<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ - ระบบแจ้งซ่อมบำรุงโรงเรียน</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="university-theme.css">

    <style>
        /* ตั้งค่าความสูงของหน้าเว็บให้เต็มจอ และใช้ Flexbox ดัน Footer ลงไปด้านล่าง */
        body {
            background-color: #f4f6f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* จัดกล่อง Login ให้อยู่กึ่งกลางหน้าจอ */
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        /* ตกแต่งกล่อง Login (Card) */
        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05);
        }

        .login-header {
            background: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
            color: white;
            text-align: center;
            padding: 2rem 1rem;
            border-top-left-radius: 12px;
            border-top-right-radius: 12px;
        }

        .login-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
    </style>
<link rel="stylesheet" href="university-theme.css"/>
</head>

<body>

    <main class="login-wrapper">
        <div class="card login-card">
            <div class="login-header">
                <i class="bi bi-tools login-icon"></i>
                <h4 class="mb-0 fw-bold">เข้าสู่ระบบ</h4>
                <p class="mb-0 text-white-50 mt-1">ระบบแจ้งซ่อมบำรุงโรงเรียน</p>
            </div>

            <div class="card-body p-4">
                <form action="#" method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label text-secondary fw-semibold">ชื่อผู้ใช้งาน</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white text-secondary"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="email" placeholder="กรอกอีเมล @sappha.ac.th"
                                required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label text-secondary fw-semibold">รหัสผ่าน</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white text-secondary"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" placeholder="กรอกรหัสผ่าน"
                                required>
                        </div>
                    </div>

                    <div class="mb-4 form-check">
                        <input type="checkbox" class="form-check-input" id="rememberMe">
                        <label class="form-check-label text-secondary" for="rememberMe">จดจำฉันไว้ในระบบ</label>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm">เข้าสู่ระบบ</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <small class="text-secondary">ยังไม่มีบัญชี?
                        <a href="register.html">สมัครสมาชิก</a>
                    </small>
                </div>
            </div>
        </div>

    </main>

    <footer class="bg-white border-top py-4 mt-5">
        <div class="container px-4">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3 text-secondary">
                <div>
                    <small>© 2026 ระบบแจ้งซ่อมบำรุงโรงเรียน. All rights reserved.</small>
                </div>
                <div>
                    <small>พัฒนาโดย <span class="fw-bold text-dark">นักเรียนชั้น ม.6</span> |
                        โปรเจ็กต์จบการศึกษา</small>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelector('form').addEventListener('submit', async function (e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = this.querySelector('button[type="submit"]');
            const originalText = btn.textContent;

            btn.disabled = true;
            btn.textContent = 'กำลังเข้าสู่ระบบ...';

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await response.json();

                if (response.ok && data.token) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    const role = data.user.role;
                    if (role === 'admin') {
                        window.location.href = '/admin.html';
                    } else if (role === 'technician') {
                        window.location.href = '/technician.html';
                    } else if (role === 'student') {
                        window.location.href = '/index.html'
                    }
                } else {
                    alert(data.error);
                    btn.disabled = false;
                    btn.textContent = originalText;
                }
            } catch {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        });
    </script>
</body>

</html>
