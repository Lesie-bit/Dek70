<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ระบบแจ้งซ่อมบำรุงโรงเรียน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* ปรับแต่งสีการ์ดและปุ่มให้ตรงกับในรูปภาพ */
        .bg-card-blue {
            background-color: #3b7ddd;
        }

        .bg-card-orange {
            background-color: #fc931d;
        }

        .bg-card-green {
            background-color: #37b762;
        }

        .btn-action-blue {
            background-color: #007bff;
            color: white;
            border: none;
        }

        .btn-action-blue:hover {
            background-color: #0056b3;
            color: white;
        }

        .btn-action-grey {
            background-color: #d1d5db;
            color: #374151;
            border: none;
        }

        .btn-action-grey:hover {
            background-color: #9ca3af;
            color: #1f2937;
        }

        /* ปรับความโค้งมนและเงา */
        .custom-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
        }

        .custom-card:hover {
            transform: translateY(-2px);
        }

        .custom-btn {
            border-radius: 12px;
            padding: 30px;
            font-size: 1.25rem;
            font-weight: 500;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: all 0.2s;
        }

        .custom-btn:hover {
            transform: translateY(-2px);
        }

        .nav-link-custom {
            color: #4b5563;
            text-decoration: none;
            font-weight: 500;
        }

        .nav-link-custom:hover {
            color: #111827;
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-white bg-white border-bottom py-3">
        <div class="container px-4">
            <a class="navbar-brand d-flex align-items-center gap-3" href="#">
                <div class="bg-primary text-white d-flex align-items-center justify-content-center rounded-circle"
                    style="width: 45px; height: 45px;">
                    <i class="bi bi-mortarboard-fill fs-4"></i>
                </div>
                <span class="fw-bold text-dark fs-5">ระบบแจ้งซ่อมบำรุงโรงเรียน</span>
            </a>

            <div class="d-flex align-items-center gap-4">
                <a href="#" class="nav-link-custom"><i class="bi bi-house-door-fill me-1"></i> Home</a>
                <a href="login.html" class="nav-link-custom"><i class="bi bi-box-arrow-right me-1"></i>
                    Login</a>
            </div>
        </div>
    </nav>

    <div class="container px-4 mt-5 flex-grow-1">

        <h2 class="fw-bold text-secondary mb-4">Dashboard</h2>

        <div class="row g-4 mb-5">
            <div class="col-12 col-md-4">
                <div class="card custom-card bg-card-blue text-white p-4">
                    <div class="d-flex align-items-center justify-content-between">
                        <div class="d-flex align-items-center gap-3">
                            <i class="bi bi-file-earmark-text fs-1"></i>
                            <span class="fs-5 fw-medium">แจ้งซ่อมทั้งหมด</span>
                        </div>
                        <h1 class="display-4 fw-bold mb-0">24</h1>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card custom-card bg-card-orange text-white p-4">
                    <div class="d-flex align-items-center justify-content-between">
                        <div class="d-flex align-items-center gap-3">
                            <i class="bi bi-wrench-adjustable bg-white text-warning rounded-circle p-2 d-inline-flex align-items-center justify-content-center"
                                style="width:50px; height:50px; color:#fc931d !important; background-color:white !important;"></i>
                            <span class="fs-5 fw-medium">กำลังดำเนินการ</span>
                        </div>
                        <h1 class="display-4 fw-bold mb-0">5</h1>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card custom-card bg-card-green text-white p-4">
                    <div class="d-flex align-items-center justify-content-between">
                        <div class="d-flex align-items-center gap-3">
                            <i class="bi bi-check-circle-fill fs-1"></i>
                            <span class="fs-5 fw-medium">ซ่อมเสร็จแล้ว</span>
                        </div>
                        <h1 class="display-4 fw-bold mb-0">19</h1>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-12 col-md-6">
                <a href="request.html" class="btn btn-action-blue custom-btn w-100 py-4 text-decoration-none">
                    <i class="bi bi-plus-circle-fill fs-3"></i>
                    <span>ส่งคำร้องแจ้งซ่อมใหม่</span>
                </a>
            </div>

            <div class="col-12 col-md-6">
                <a href="check.html" class="btn btn-action-grey custom-btn w-100 py-4 text-decoration-none">
                    <i class="bi bi-search fs-3"></i>
                    <span>ติดตามสถานะการแจ้งซ่อม</span>
                </a>
            </div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <footer class="bg-white border-top py-4 mt-5">
        <div class="container px-4">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-3 text-secondary">
                <div>
                    <small>© 2026 ระบบแจ้งซ่อมบำรุงโรงเรียน. All rights reserved.</small>
                </div>
                <div>
                    <small>พัฒนาโดย <span class="fw-bold text-dark">นักเรียนชั้น ม.6</span> |
                        โปรเจ็กต์จบการศึกษา</small>
                </div>
            </div>
        </div>
    </footer>
</body>

</html>
