<!DOCTYPE html>
<html lang="th">
<head>
    <script>
        if (!localStorage.getItem('token')) { window.location.href = 'login.html' }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าหลัก - ระบบแจ้งซ่อมบำรุงโรงเรียนสรรพวิทยาคม</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root { --navy: #1B3A6B; --navy-mid: #2D5F8A; --navy-light: #4A90C4; --navy-pale: #E8F0F8; --gold: #C9922A; }
        body { background-color: #F0F4F8; font-family: 'Segoe UI', 'Sarabun', sans-serif; }
        .navbar-main { background: var(--navy); box-shadow: 0 2px 12px rgba(27,58,107,0.2); }
        .navbar-main .navbar-brand { color: white !important; font-weight: 700; }
        .navbar-main .nav-user { color: rgba(255,255,255,0.85); font-size: 0.9rem; }
        .hero-bar { background: linear-gradient(90deg, var(--navy) 0%, var(--navy-mid) 100%); color: white; padding: 2rem 0; border-bottom: 4px solid var(--gold); }
        .stat-card { border: none; border-radius: 12px; box-shadow: 0 4px 16px rgba(27,58,107,0.1); transition: transform 0.2s; overflow: hidden; }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-card .card-body { padding: 1.5rem; }
        .stat-icon { width: 52px; height: 52px; border-radius: 10px; display: flex; align-items: center; justify-content: center; }
        .action-btn { border-radius: 12px; padding: 2rem; font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 12px; transition: all 0.2s; border: none; text-decoration: none; }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
        .btn-request { background: var(--navy); color: white; }
        .btn-request:hover { background: var(--navy-mid); color: white; }
        .btn-track { background: white; color: var(--navy); border: 2px solid var(--navy-light); }
        .btn-track:hover { background: var(--navy-pale); color: var(--navy); }
        footer { background: var(--navy); color: rgba(255,255,255,0.6); }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-main py-3">
        <div class="container px-4 d-flex justify-content-between align-items-center">
            <a class="navbar-brand d-flex align-items-center gap-2" href="#">
                <i class="bi bi-tools fs-5"></i>
                <span>ระบบแจ้งซ่อมบำรุง โรงเรียนสรรพวิทยาคม</span>
            </a>
            <div class="d-flex align-items-center gap-3">
                <span class="nav-user"><i class="bi bi-person-circle me-1"></i><span id="userName"></span></span>
                <button onclick="logout()" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-box-arrow-right me-1"></i>ออกจากระบบ
                </button>
            </div>
        </div>
    </nav>

    <div class="hero-bar">
        <div class="container px-4">
            <h4 class="fw-bold mb-1">สวัสดี, <span id="heroName"></span> 👋</h4>
            <p class="mb-0 opacity-75 small">ระบบแจ้งซ่อมบำรุงอาคารและสถานที่ โรงเรียนสรรพวิทยาคม</p>
        </div>
    </div>

    <div class="container px-4 mt-4 flex-grow-1">
        <!-- Stats -->
        <div class="row g-3 mb-4">
            <div class="col-12 col-md-4">
                <div class="card stat-card" style="border-left: 4px solid #1B3A6B;">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="stat-icon bg-navy-pale" style="background:#E8F0F8">
                            <i class="bi bi-file-earmark-text fs-4" style="color:#1B3A6B"></i>
                        </div>
                        <div>
                            <p class="text-muted mb-0 small">คำขอทั้งหมด</p>
                            <h2 class="fw-bold mb-0" id="statTotal" style="color:#1B3A6B">-</h2>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="card stat-card" style="border-left: 4px solid #C9922A;">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="stat-icon" style="background:#FEF3E2">
                            <i class="bi bi-wrench fs-4" style="color:#C9922A"></i>
                        </div>
                        <div>
                            <p class="text-muted mb-0 small">กำลังดำเนินการ</p>
                            <h2 class="fw-bold mb-0" id="statInProgress" style="color:#C9922A">-</h2>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-4">
                <div class="card stat-card" style="border-left: 4px solid #2E7D52;">
                    <div class="card-body d-flex align-items-center gap-3">
                        <div class="stat-icon" style="background:#E6F4EC">
                            <i class="bi bi-check-circle-fill fs-4" style="color:#2E7D52"></i>
                        </div>
                        <div>
                            <p class="text-muted mb-0 small">ซ่อมเสร็จแล้ว</p>
                            <h2 class="fw-bold mb-0" id="statDone" style="color:#2E7D52">-</h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="row g-3">
            <div class="col-12 col-md-6">
                <a href="request.html" class="action-btn btn-request w-100">
                    <i class="bi bi-plus-circle-fill fs-3"></i>
                    <span>แจ้งซ่อมบำรุง</span>
                </a>
            </div>
            <div class="col-12 col-md-6">
                <a href="check.html" class="action-btn btn-track w-100">
                    <i class="bi bi-search fs-3"></i>
                    <span>ติดตามสถานะ</span>
                </a>
            </div>
        </div>
    </div>

    <footer class="py-4 mt-5">
        <div class="container px-4">
            <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
                <small>© 2026 ระบบแจ้งซ่อมบำรุง โรงเรียนสรรพวิทยาคม. All rights reserved.</small>
                <small>พัฒนาโดย <span class="text-white fw-semibold">นักเรียนชั้น ม.6</span> | โปรเจ็กต์จบการศึกษา</small>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'))
        const token = localStorage.getItem('token')

        if (user) {
            document.getElementById('userName').textContent = user.name
            document.getElementById('heroName').textContent = user.name
            if (user.role === 'technician') window.location.href = '/technician.html'
            else if (user.role === 'admin') window.location.href = '/admin.html'
        }

        // โหลดสถิติของตัวเองจาก API
        async function loadStats() {
            try {
                const res = await fetch('/api/stats', {
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                const data = await res.json()
                document.getElementById('statTotal').textContent = data.total
                document.getElementById('statInProgress').textContent = data.in_progress
                document.getElementById('statDone').textContent = data.done
            } catch { }
        }

        function logout() {
            localStorage.removeItem('token')
            localStorage.removeItem('user')
            window.location.href = '/login.html'
        }

        loadStats()
    </script>
</body>
</html>
